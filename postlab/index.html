<!DOCTYPE html>
<html>
<head>
    <title>Language Detector & Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Language Detector & Translator</h1>

        <textarea id="inputText" placeholder="Paste text here..."></textarea>

        <button onclick="processText()">Detect & Translate</button>

        <h3>Detected Language:</h3>
        <p id="language"></p>

        <h3>Translation (English):</h3>
        <p id="translation"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
