<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Sentiment Analysis</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/gh/thisandagain/sentiment@master/build/sentiment.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Text Sentiment Analysis</h1>

            <button onclick="clearAll()">Clear</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
